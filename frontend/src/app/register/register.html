<div class="page-wrapper">
  <div class="login-card">

    <!-- HEADER -->
    <div class="login-header">
      <img src="/mapua-logo.png" alt="Mapua Logo" class="logo" />
      <div class="text-section">
        <span class="library-text">MAPÚA LIBRARY</span>
        <span class="divider">|</span>
        <span class="platform-text">CATALOGING SEARCH PLATFORM</span>
      </div>
    </div>

    <!-- WELCOME -->
    <div class="welcome-section">
      <h2>Create Account</h2>
      <p>Please fill in the details below.</p>
    </div>

    <!-- FULL NAME -->
    <div class="form-group">
      <label>Full Name:</label>
      <input [(ngModel)]="name" placeholder="Enter full name" />
    </div>

    <!-- EMAIL -->
    <div class="form-group">
      <label>Email:</label>
      <input [(ngModel)]="email" placeholder="user@mymail.mapua.edu.ph" />
    </div>

    <!-- PASSWORD -->
    <div class="form-group">
      <label>Password:</label>
      <div class="password-wrapper">
        <input
          [type]="showPassword ? 'text' : 'password'"
          [(ngModel)]="password"
          placeholder="Enter strong password" />

        <button type="button"
                class="toggle-password"
                (click)="togglePassword()">

          <!-- Eye Open -->
          <svg *ngIf="!showPassword"
               class="eye-icon"
               xmlns="http://www.w3.org/2000/svg"
               viewBox="0 0 24 24"
               fill="none"
               stroke="currentColor"
               stroke-width="2"
               stroke-linecap="round"
               stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>

          <!-- Eye Closed -->
          <svg *ngIf="showPassword"
               class="eye-icon"
               xmlns="http://www.w3.org/2000/svg"
               viewBox="0 0 24 24"
               fill="none"
               stroke="currentColor"
               stroke-width="2"
               stroke-linecap="round"
               stroke-linejoin="round">
            <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20C5 20 1 12 1 12a21.76 21.76 0 0 1 5.06-6.94"/>
            <path d="M1 1l22 22"/>
          </svg>

        </button>
      </div>
    </div>

    <!-- CONFIRM PASSWORD -->
    <div class="form-group">
      <label>Confirm Password:</label>
      <div class="password-wrapper">
        <input
          [type]="showConfirmPassword ? 'text' : 'password'"
          [(ngModel)]="confirmPassword"
          placeholder="Re-enter password" />

        <button type="button"
                class="toggle-password"
                (click)="toggleConfirmPassword()">

          <!-- Eye Open -->
          <svg *ngIf="!showConfirmPassword"
               class="eye-icon"
               xmlns="http://www.w3.org/2000/svg"
               viewBox="0 0 24 24"
               fill="none"
               stroke="currentColor"
               stroke-width="2"
               stroke-linecap="round"
               stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>

          <!-- Eye Closed -->
          <svg *ngIf="showConfirmPassword"
               class="eye-icon"
               xmlns="http://www.w3.org/2000/svg"
               viewBox="0 0 24 24"
               fill="none"
               stroke="currentColor"
               stroke-width="2"
               stroke-linecap="round"
               stroke-linejoin="round">
            <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20C5 20 1 12 1 12a21.76 21.76 0 0 1 5.06-6.94"/>
            <path d="M1 1l22 22"/>
          </svg>

        </button>
      </div>
    </div>

    <!-- ROLE -->
    <div class="form-group">
      <label>Role:</label>
      <select [(ngModel)]="role">
        <option value="STUDENT_ASSISTANT">Student Assistant</option>
        <option value="ADMIN">Admin</option>
      </select>
    </div>

    <!-- PASSWORD RULES -->
    <div class="password-rules">
      <strong>Password must contain:</strong>
      <ul>
        <li [class.valid]="hasMinLength()">At least 12 characters</li>
        <li [class.valid]="hasUppercase()">One uppercase letter</li>
        <li [class.valid]="hasLowercase()">One lowercase letter</li>
        <li [class.valid]="hasNumber()">One number</li>
        <li [class.valid]="hasSymbol()">One symbol</li>
      </ul>
    </div>

    <button class="login-btn" (click)="register()">
      Register
    </button>

    <div class="login-links">
      <p class="register-link" (click)="goBack()">Back to Login</p>
    </div>

    <p class="error" *ngIf="errorMessage">
      {{ errorMessage }}
    </p>

  </div>
</div>
