<!-- ================= SYSTEM HEADER ===================== -->
<!-- Displays institutional branding and platform title   -->
<!-- Used across all major pages for UI consistency       -->
<!-- ===================================================== -->

<header class="header-container">

  <div class="header-content">
    
    <!-- ================= LOGO SECTION ================= -->
    <!-- Official Mapúa University logo -->
    <img src="mapua-logo.png"
         alt="Mapua Logo"
         class="logo" />

    <!-- ================= TEXT SECTION ================= -->
    <!-- System Name + Platform Name -->
    <div class="text-section">

      <!-- Main Institutional Label -->
      <span class="library-text">
        MAPÚA LIBRARY
      </span>

      <!-- Visual Divider -->
      <span class="divider">|</span>

      <!-- System Platform Title -->
      <span class="platform-text">
        CATALOGING SEARCH PLATFORM
      </span>

    </div>

  </div>
</header>
