<!-- Main Layout Container -->
<div class="layout-container">

  <div class="main-content">

    <div class="content-wrapper">

      <!-- PAGE TITLE -->
      <h2 class="title">Manage Account</h2>

      <!-- ACCOUNT INFORMATION CARD -->
      <div class="account-card">

        <!-- PROFILE SECTION (Static placeholder profile image) -->
        <div class="profile-section">
          <div class="profile-wrapper">
            <img
              src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
              alt="Profile"
              class="profile-image"
            />
            <!-- Camera icon (Future feature: profile upload) -->
            <div class="camera-icon">
              📷
            </div>
          </div>
        </div>

        <!-- LOADING STATE -->
        <!-- Displayed while fetching user data from backend -->
        <div *ngIf="loading" class="status-text">
          Loading account information...
        </div>

        <!-- ACCOUNT DETAILS FORM -->
        <!-- Only shown when data is successfully retrieved -->
        <div class="form-section" *ngIf="!loading && user">

          <!-- USER NAME (Read-only) -->
          <div class="form-group">
            <label>Name</label>
            <input type="text" [value]="user.name" readonly />
          </div>

          <!-- USER EMAIL (Read-only) -->
          <div class="form-group">
            <label>Email</label>
            <input type="text" [value]="user.email" readonly />
          </div>

          <!-- USER ROLE (Admin / Librarian / Student Assistant) -->
          <div class="form-group">
            <label>Role</label>
            <input type="text" [value]="user.role" readonly />
          </div>

        </div>

        <!-- ERROR / EMPTY STATE -->
        <!-- Displayed if loading finished but no user data found -->
        <div *ngIf="!loading && !user" class="status-text">
          No account data found.
        </div>

      </div>

    </div>

  </div>

</div>
