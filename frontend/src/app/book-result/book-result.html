<!-- ===================================================== -->
<!-- ================= BOOK RESULT CARD ================== -->
<!-- Displays summarized book information in search list -->
<!-- ===================================================== -->

<div class="result-card">

  <!-- ================= BOOK COVER ================= -->
  <!-- Shows book cover image if available.
       If image fails or does not exist, display placeholder icon. -->
  <div class="book-cover">
    <ng-container *ngIf="book?.coverImageUrl; else noImage">
      <img
        [src]="book.coverImageUrl"
        alt="Book Cover"
        (error)="book.coverImageUrl = null"
      />
    </ng-container>

    <ng-template #noImage>
      <div class="no-cover">📖</div>
    </ng-template>
  </div>

  <!-- ================= BOOK BASIC INFO ================= -->
  <!-- Displays title, author(s), and ISBN -->
  <div class="book-info">
    <h4>{{ book?.title }}</h4>
    <p><strong>By</strong> {{ book?.authors }}</p>
    <p><strong>ISBN:</strong> {{ book?.isbn }}</p>
  </div>

  <!-- ================= ACTION BUTTONS ================= -->
  <!-- Pin button + Open details button -->
  <div class="book-action">

    <!-- PIN BUTTON -->
    <!-- Toggles pinned state using PinService -->
    <button
      class="pin-btn"
      [class.pinned]="pinService.isPinned(book?.isbn)"
      (click)="togglePin($event)">
      📌
    </button>

    <!-- OPEN DETAILS BUTTON -->
    <!-- Opens modal with full book details -->
    <button
      class="action-btn"
      (click)="openDetails()">
      ➜
    </button>

  </div>
</div>


<!-- ===================================================== -->
<!-- ================= BOOK DETAILS MODAL ================= -->
<!-- Appears when user clicks "Open Details" button       -->
<!-- ===================================================== -->

<div class="details-overlay"
     *ngIf="showModal"
     (click)="onOverlayClick($event)">

  <!-- Prevent modal click from closing itself -->
  <div class="details-modal"
       (click)="$event.stopPropagation()">

    <!-- ================= MODAL HEADER ================= -->
    <div class="details-header">

      <!-- CLOSE BUTTON -->
      <button class="close-btn"
              (click)="closeDetails()">
        ✕
      </button>

      <!-- PIN BUTTON (inside modal) -->
      <button class="modal-pin-btn"
              [class.pinned]="pinService.isPinned(book?.isbn)"
              (click)="togglePin($event)">
        📌
      </button>

    </div>

    <div class="details-divider"></div>

    <!-- ================= MODAL COVER IMAGE ================= -->
    <div class="modal-cover">
      <ng-container *ngIf="book?.coverImageUrl; else modalNoImage">
        <img
          [src]="book.coverImageUrl"
          alt="Book Cover"
          (error)="book.coverImageUrl = null"
        />
      </ng-container>

      <ng-template #modalNoImage>
        <div class="no-cover large">📖</div>
      </ng-template>
    </div>


    <!-- ===================================================== -->
    <!-- ================= BOOK DETAILS SECTION =============== -->
    <!-- Displays complete bibliographic information          -->
    <!-- Switches between View Mode and Edit Mode             -->
    <!-- ===================================================== -->

    <div class="details-content">

      <!-- ISBN (Read-only) -->
      <div class="details-row">
        <label>ISBN:</label>
        <div class="details-box">{{ book?.isbn }}</div>
      </div>

      <!-- TITLE -->
      <div class="details-row">
        <label>Title:</label>

        <!-- Editable input (Admin only) -->
        <input *ngIf="editMode"
               [(ngModel)]="editableBook.title" />

        <!-- View mode -->
        <div *ngIf="!editMode"
             class="details-box">
          {{ book?.title }}
        </div>
      </div>

      <!-- AUTHOR -->
      <div class="details-row">
        <label>Author:</label>

        <input *ngIf="editMode"
               [(ngModel)]="editableBook.authors" />

        <div *ngIf="!editMode"
             class="details-box">
          {{ book?.authors }}
        </div>
      </div>

      <!-- LCCN -->
      <div class="details-row">
        <label>LCCN:</label>

        <input *ngIf="editMode"
               [(ngModel)]="editableBook.lccn" />

        <div *ngIf="!editMode"
             class="details-box">
          {{ book?.lccn }}
        </div>
      </div>

      <!-- PUBLICATION YEAR -->
      <div class="details-row">
        <label>Publication Year:</label>

        <input *ngIf="editMode"
               [(ngModel)]="editableBook.publicationYear" />

        <div *ngIf="!editMode"
             class="details-box">
          {{ book?.publicationYear }}
        </div>
      </div>

      <!-- EDITION -->
      <div class="details-row">
        <label>Edition:</label>

        <input *ngIf="editMode"
               [(ngModel)]="editableBook.edition" />

        <div *ngIf="!editMode"
             class="details-box">
          {{ book?.edition }}
        </div>
      </div>

      <!-- PUBLISHER -->
      <div class="details-row">
        <label>Publisher:</label>

        <input *ngIf="editMode"
               [(ngModel)]="editableBook.publisher" />

        <div *ngIf="!editMode"
             class="details-box">
          {{ book?.publisher }}
        </div>
      </div>

      <!-- CONTENT NOTES -->
      <div class="details-row">
        <label>Content Notes:</label>

        <input *ngIf="editMode"
               [(ngModel)]="editableBook.contentNotes" />

        <div *ngIf="!editMode"
             class="details-box">
          {{ book?.contentNotes }}
        </div>
      </div>

      <!-- CUTTER NUMBER -->
      <div class="details-row">
        <label>Cutter Number:</label>

        <input *ngIf="editMode"
               [(ngModel)]="editableBook.cutterNumber" />

        <div *ngIf="!editMode"
             class="details-box">
          {{ book?.cutterNumber }}
        </div>
      </div>

      <!-- SUMMARY (Large Field) -->
      <div class="details-row">
        <label>Summary:</label>

        <textarea *ngIf="editMode"
                  [(ngModel)]="editableBook.summary">
        </textarea>

        <div *ngIf="!editMode"
             class="details-textarea">
          {{ book?.summary }}
        </div>
      </div>

    </div>


    <!-- ===================================================== -->
    <!-- ================= EDIT CONTROLS ===================== -->
    <!-- Visible only when:
         - User is ADMIN
         - Book is pinned
         - Not currently editing
    -->
    <!-- ===================================================== -->

    <div class="edit-actions">

      <!-- SHOW EDIT BUTTON -->
      <button *ngIf="!editMode 
                      && isAdmin 
                      && pinService.isPinned(book?.isbn)"
              class="edit-btn"
              (click)="enableEdit()">
        Edit
      </button>

      <!-- SAVE / CANCEL BUTTONS -->
      <div *ngIf="editMode">

        <button class="save-btn"
                (click)="saveChanges()">
          Save
        </button>

        <button class="cancel-btn"
                (click)="cancelEdit()">
          Cancel
        </button>

      </div>

    </div>

  </div>
</div>
